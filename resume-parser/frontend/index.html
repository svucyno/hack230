<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Anti-Gravity Resume Parser — Upload, parse and score resumes with an out-of-this-world space UI." />
  <title>ResumeOrbit — Anti-Gravity Resume Parser 🚀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"><!-- React will mount here --></div>
  <noscript>JavaScript disabled - Enable JS for full app.</noscript>
  
  <!-- Production Static Build (needs local server for assets) -->
  <script type="module" crossorigin src="./dist/assets/index-DkQuqc9I.js"></script>
  <link rel="stylesheet" crossorigin href="./dist/assets/index-Di6JjSJS.css">
  
  <!-- Fallback Static Content (for direct file:// open) -->
  <style>
    body { margin: 0; font-family: Outfit, sans-serif; background: #0a0a0f; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .fallback { text-align: center; max-width: 500px; padding: 2rem; }
    .glow { color: #00d4ff; text-shadow: 0 0 20px rgba(0,212,255,0.5); font-size: 3rem; font-weight: 900; }
    .btn { background: linear-gradient(135deg, #00d4ff, #7b2fff); color: white; padding: 1rem 2rem; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
  </style>
  <div id="fallback" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,15,0.95); z-index: 9999; display: flex;">
    <div class="fallback">
      <div class="glow">🚀 ResumeOrbit</div>
      <p>Anti-Gravity Resume Parser ready for launch!</p>
      <p style="color: #a0a0b0; font-size: 1rem;">
        Dev server running? Visit <strong>localhost:5173</strong><br>
        Or run: <code>npm run dev</code> in <code>frontend/</code><br><br>
        Backend at localhost:8000 for uploads.
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (!document.getElementById('root').hasChildNodes() || !window.React) {
        document.getElementById('fallback').style.display = 'flex';
      }
    });
  </script>
</body>

</html>
